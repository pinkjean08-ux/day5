name: Collect Starbucks Korea stores

on:
  workflow_dispatch:
  schedule:
    - cron: "15 21 1 * *"  # 매월 2일 06:15 KST (UTC 기준)

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect stores and create Excel
        run: python scrape_starbucks.py --output output/starbucks_korea_stores.xlsx

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: starbucks-korea-stores
          path: output/starbucks_korea_stores.xlsx
          if-no-files-found: error
          retention-days: 90
